<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>SpeedGuard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ok: #00e5a0;
    --warn: #ffb300;
    --danger: #ff2d55;
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #1e1e2e;
    --text: #e0e0f0;
    --muted: #555570;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    height:100%; width:100%;
    overflow:hidden;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
  }

  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,229,160,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.025) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:0; animation:gridMove 20s linear infinite;
  }
  @keyframes gridMove { to { transform:translateY(40px); } }

  .app {
    position:relative; z-index:1;
    height:100%; display:flex; flex-direction:column;
    padding:8px 12px; gap:6px;
    max-width:480px; margin:0 auto;
  }

  /* HEADER */
  .header { display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .logo {
    font-family:'Orbitron',monospace; font-size:14px; font-weight:900;
    letter-spacing:3px; color:var(--ok); text-shadow:0 0 16px rgba(0,229,160,0.5);
  }
  .header-right { display:flex; align-items:center; gap:8px; }
  .clock {
    font-family:'Orbitron',monospace; font-size:13px; font-weight:700;
    color:var(--text); letter-spacing:1px;
  }
  .status-dot { width:8px; height:8px; border-radius:50%; background:var(--muted); transition:all 0.4s; }
  .status-dot.active { background:var(--ok); box-shadow:0 0 8px var(--ok); animation:pulse 2s infinite; }
  .status-dot.danger { background:var(--danger); box-shadow:0 0 8px var(--danger); animation:pulseFast 0.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes pulseFast { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ALERT */
  .alert-banner {
    flex-shrink:0;
    background:rgba(255,45,85,0.15); border:1px solid rgba(255,45,85,0.5);
    border-radius:10px; padding:0 12px; text-align:center;
    font-family:'Orbitron',monospace; font-size:11px; font-weight:700;
    color:var(--danger); letter-spacing:2px;
    max-height:0; overflow:hidden; opacity:0;
    transition:max-height 0.3s, opacity 0.3s, padding 0.3s;
  }
  .alert-banner.visible { max-height:36px; opacity:1; padding:6px 12px; animation:alertPulse 0.8s infinite; }
  @keyframes alertPulse { 0%,100%{background:rgba(255,45,85,0.15)} 50%{background:rgba(255,45,85,0.3)} }

  /* SPEED CARD */
  .speed-card {
    flex-shrink:0;
    background:var(--panel); border:1px solid var(--border);
    border-radius:20px; padding:12px 12px 8px; text-align:center;
    position:relative; overflow:hidden;
    transition:border-color 0.3s, box-shadow 0.3s;
  }
  .speed-card::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% 0%, rgba(0,229,160,0.06) 0%, transparent 70%);
    pointer-events:none; transition:background 0.3s;
  }
  .speed-card.over::before { background:radial-gradient(ellipse at 50% 0%, rgba(255,45,85,0.12) 0%, transparent 70%); }
  .speed-card.over { border-color:var(--danger); box-shadow:0 0 30px rgba(255,45,85,0.15); }
  .speed-label { font-size:8px; letter-spacing:4px; text-transform:uppercase; color:var(--muted); }
  .speed-value {
    font-family:'Orbitron',monospace; font-size:72px; font-weight:900;
    line-height:1; color:var(--ok); text-shadow:0 0 30px rgba(0,229,160,0.4);
    transition:color 0.3s, text-shadow 0.3s; letter-spacing:-2px;
  }
  .speed-value.over { color:var(--danger); text-shadow:0 0 30px rgba(255,45,85,0.5); }
  .speed-unit { font-family:'Orbitron',monospace; font-size:10px; color:var(--muted); letter-spacing:2px; }
  .accuracy-bar { height:2px; background:var(--border); border-radius:2px; margin-top:6px; overflow:hidden; }
  .accuracy-fill { height:100%; background:var(--ok); border-radius:2px; transition:width 0.5s; width:0%; }

  /* INFO ROW */
  .info-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; flex-shrink:0; }
  .info-card {
    background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:7px 6px; text-align:center;
  }
  .info-card-label { font-size:7px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
  .info-card-value { font-family:'Orbitron',monospace; font-size:16px; font-weight:700; color:var(--text); line-height:1.1; }
  .info-card-unit { font-size:7px; color:var(--muted); margin-top:1px; letter-spacing:1px; }
  .limit-badge {
    display:inline-block; width:34px; height:34px;
    border-radius:50%; border:2px solid var(--danger);
    line-height:30px; font-family:'Orbitron',monospace;
    font-size:12px; font-weight:900; color:var(--text);
  }

  /* WEATHER + TRAFFIC ROW */
  .wt-row { display:grid; grid-template-columns:1fr 1fr; gap:6px; flex-shrink:0; }
  .wt-card {
    background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:8px 10px;
    display:flex; align-items:center; gap:8px;
  }
  .wt-icon { font-size:22px; flex-shrink:0; }
  .wt-info { flex:1; min-width:0; }
  .wt-label { font-size:7px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:2px; }
  .wt-value { font-family:'Orbitron',monospace; font-size:13px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .wt-sub { font-size:8px; color:var(--muted); margin-top:1px; }

  /* COMPASS */
  .compass-row { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .compass-card {
    flex:1; background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:8px 12px;
    display:flex; align-items:center; gap:10px;
  }
  .compass-circle {
    width:36px; height:36px; border-radius:50%;
    border:2px solid var(--border); position:relative; flex-shrink:0;
    background:var(--bg);
  }
  .compass-needle {
    position:absolute; top:50%; left:50%;
    width:2px; height:14px; background:var(--danger);
    transform-origin:bottom center;
    transform:translateX(-50%) translateY(-100%) rotate(0deg);
    border-radius:2px 2px 0 0;
    transition:transform 0.5s ease;
  }
  .compass-needle::after {
    content:''; position:absolute; bottom:-6px; left:50%;
    transform:translateX(-50%);
    width:2px; height:6px; background:var(--ok);
    border-radius:0 0 2px 2px;
  }
  .compass-info { flex:1; }
  .compass-label { font-size:7px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:2px; }
  .compass-value { font-family:'Orbitron',monospace; font-size:16px; font-weight:700; color:var(--text); }
  .compass-dir { font-size:9px; color:var(--ok); margin-top:1px; }

  .osm-card {
    flex:1; background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:8px 10px;
    display:flex; align-items:center; gap:6px;
  }
  .osm-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); flex-shrink:0; }
  .osm-dot.ok { background:var(--ok); }
  .osm-dot.loading { background:var(--warn); animation:pulse 1s infinite; }
  .osm-text { font-size:9px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* LIMIT CARD */
  .limit-card {
    background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:7px 10px; flex-shrink:0;
  }
  .limit-title { font-size:7px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
  .limit-buttons { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
  .limit-btn {
    background:var(--bg); border:1px solid var(--border); border-radius:7px;
    padding:6px 2px; font-family:'Orbitron',monospace; font-size:11px;
    font-weight:700; color:var(--muted); cursor:pointer; transition:all 0.2s; text-align:center;
  }
  .limit-btn.active { background:rgba(0,229,160,0.1); border-color:var(--ok); color:var(--ok); }
  .limit-btn.manual-btn { font-size:8px; }
  .manual-input-row { display:none; gap:5px; margin-top:5px; }
  .manual-input-row.visible { display:flex; }
  .manual-input {
    flex:1; background:var(--bg); border:1px solid var(--border);
    border-radius:7px; padding:6px 8px; font-family:'Orbitron',monospace;
    font-size:15px; font-weight:700; color:var(--text); text-align:center; outline:none;
  }
  .manual-input:focus { border-color:var(--ok); }
  .manual-confirm {
    background:rgba(0,229,160,0.15); border:1px solid var(--ok);
    border-radius:7px; padding:6px 12px; font-family:'Orbitron',monospace;
    font-size:10px; font-weight:700; color:var(--ok); cursor:pointer;
  }

  /* START BUTTON */
  .start-btn {
    flex-shrink:0;
    background:linear-gradient(135deg, rgba(0,229,160,0.15), rgba(0,229,160,0.05));
    border:1px solid var(--ok); border-radius:12px; padding:13px;
    font-family:'Orbitron',monospace; font-size:13px; font-weight:700;
    letter-spacing:3px; color:var(--ok); cursor:pointer; text-align:center;
    box-shadow:0 0 20px rgba(0,229,160,0.1); transition:all 0.2s;
  }
  .start-btn.stop {
    background:linear-gradient(135deg, rgba(255,45,85,0.15), rgba(255,45,85,0.05));
    border-color:var(--danger); color:var(--danger);
    box-shadow:0 0 20px rgba(255,45,85,0.1);
  }

  /* FOOTER */
  .footer {
    flex-shrink:0; text-align:center;
    font-size:8px; color:var(--muted); letter-spacing:1px;
    padding-bottom:2px;
  }
  .footer span { color:#3a3a55; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">SPEEDGUARD</div>
    <div class="header-right">
      <div class="clock" id="clock">00:00:00</div>
      <div class="status-dot" id="statusDot"></div>
    </div>
  </div>

  <div class="alert-banner" id="alertBanner">⚠ VITESSE DÉPASSÉE</div>

  <div class="speed-card" id="speedCard">
    <div class="speed-label">VITESSE ACTUELLE</div>
    <div class="speed-value" id="speedValue">0</div>
    <div class="speed-unit">km/h</div>
    <div class="accuracy-bar"><div class="accuracy-fill" id="accuracyFill"></div></div>
  </div>

  <div class="info-row">
    <div class="info-card">
      <div class="info-card-label">LIMITE</div>
      <div class="limit-badge" id="limitBadge">—</div>
      <div class="info-card-unit">km/h</div>
    </div>
    <div class="info-card">
      <div class="info-card-label">EXCÈS</div>
      <div class="info-card-value" id="excessValue" style="color:var(--muted)">0</div>
      <div class="info-card-unit">km/h</div>
    </div>
    <div class="info-card">
      <div class="info-card-label">MAX</div>
      <div class="info-card-value" id="maxSpeed" style="color:var(--warn)">0</div>
      <div class="info-card-unit">km/h</div>
    </div>
  </div>

  <div class="wt-row">
    <div class="wt-card">
      <div class="wt-icon" id="weatherIcon">🌡️</div>
      <div class="wt-info">
        <div class="wt-label">MÉTÉO</div>
        <div class="wt-value" id="weatherTemp">-- °C</div>
        <div class="wt-sub" id="weatherDesc">En attente GPS</div>
      </div>
    </div>
    <div class="wt-card">
      <div class="wt-icon" id="trafficIcon">🚗</div>
      <div class="wt-info">
        <div class="wt-label">TRAFIC</div>
        <div class="wt-value" id="trafficStatus">--</div>
        <div class="wt-sub" id="trafficSub">En attente GPS</div>
      </div>
    </div>
  </div>

  <div class="compass-row">
    <div class="compass-card">
      <div class="compass-circle">
        <div class="compass-needle" id="compassNeedle"></div>
      </div>
      <div class="compass-info">
        <div class="compass-label">DIRECTION</div>
        <div class="compass-value" id="compassDeg">--°</div>
        <div class="compass-dir" id="compassDir">En attente</div>
      </div>
    </div>
    <div class="osm-card">
      <div class="osm-dot" id="osmDot"></div>
      <span class="osm-text" id="osmStatus">OSM inactif</span>
    </div>
  </div>

  <div class="limit-card">
    <div class="limit-title">LIMITE MANUELLE (si OSM échoue)</div>
    <div class="limit-buttons">
      <button class="limit-btn" onclick="setManualLimit(30,this)">30</button>
      <button class="limit-btn active" onclick="setManualLimit(50,this)">50</button>
      <button class="limit-btn" onclick="setManualLimit(80,this)">80</button>
      <button class="limit-btn" onclick="setManualLimit(110,this)">110</button>
      <button class="limit-btn" onclick="setManualLimit(130,this)">130</button>
      <button class="limit-btn" onclick="setManualLimit(90,this)">90</button>
      <button class="limit-btn" onclick="setManualLimit(70,this)">70</button>
      <button class="limit-btn manual-btn" onclick="toggleManual()">AUTRE</button>
    </div>
    <div class="manual-input-row" id="manualRow">
      <input class="manual-input" type="number" id="manualInput" placeholder="60" min="1" max="300">
      <button class="manual-confirm" onclick="confirmManual()">OK</button>
    </div>
  </div>

  <button class="start-btn" id="startBtn" onclick="toggleTracking()">▶ DÉMARRER</button>

  <div class="footer">
    Développé par <span style="color:var(--ok);font-weight:700;">1war</span>
    &nbsp;|&nbsp; © 2026 SpeedGuard <span>— Tous droits réservés</span>
  </div>

</div>

<script>
// ============================================================
// CONFIG — Remplace YOUR_KEY par ta clé OpenWeatherMap
// ============================================================
const WEATHER_API_KEY = '03e7db01581282339015f0ff274a6e50';
const TOMTOM_API_KEY  = 'FREE'; // TomTom gratuit sans clé pour données basiques

// ============================================================
// STATE
// ============================================================
let tracking = false, watchId = null;
let manualLimit = 50, osmLimit = null, currentSpeed = 0, maxSpeed = 0;
let audioCtx = null, beepInterval = null;
let lastOsmFetch = 0, lastWeatherFetch = 0, lastTrafficFetch = 0;
let lastLat = null, lastLon = null, osmMode = false;
let currentHeading = null;

// ============================================================
// CLOCK
// ============================================================
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = h+':'+m+':'+s;
}
setInterval(updateClock, 1000);
updateClock();

// ============================================================
// AUDIO
// ============================================================
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function beep(freq=880, duration=200, vol=0.4) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.value = freq; osc.type = 'square';
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration/1000);
  osc.start(); osc.stop(audioCtx.currentTime + duration/1000);
}

function startBeeping() {
  if (beepInterval) return;
  beepInterval = setInterval(() => {
    const excess = currentSpeed - activeLimit();
    if (excess > 20) { beep(1100,150,0.5); setTimeout(()=>beep(1100,150,0.5),200); }
    else if (excess > 10) beep(880,200,0.4);
    else beep(660,300,0.3);
  }, 800);
}

function stopBeeping() { clearInterval(beepInterval); beepInterval = null; }

// ============================================================
// LIMITS
// ============================================================
function activeLimit() { return osmMode && osmLimit ? osmLimit : manualLimit; }

function setManualLimit(v, btn) {
  manualLimit = v;
  document.querySelectorAll('.limit-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  updateUI();
}

function toggleManual() { document.getElementById('manualRow').classList.toggle('visible'); }

function confirmManual() {
  const val = parseInt(document.getElementById('manualInput').value);
  if (val > 0 && val <= 300) {
    manualLimit = val;
    document.querySelectorAll('.limit-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('manualRow').classList.remove('visible');
    updateUI();
  }
}

// ============================================================
// OSM
// ============================================================
async function fetchOsmLimit(lat, lon) {
  const now = Date.now();
  if (now - lastOsmFetch < 15000) return;
  if (lastLat !== null && Math.hypot(lat-lastLat, lon-lastLon) < 0.0003) return;
  lastOsmFetch = now; lastLat = lat; lastLon = lon;
  setOsmStatus('loading', 'Recherche...');
  try {
    const q = `[out:json][timeout:8];way(around:30,${lat},${lon})[highway][maxspeed];out tags 1;`;
    const res = await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q)});
    const data = await res.json();
    if (data.elements?.length > 0) {
      const parsed = parseMaxspeed(data.elements[0].tags.maxspeed);
      if (parsed) { osmLimit=parsed; osmMode=true; setOsmStatus('ok',`OSM: ${parsed} km/h`); updateUI(); return; }
    }
    setOsmStatus('','OSM: aucune limite'); osmMode=false;
  } catch { setOsmStatus('','OSM indispo'); osmMode=false; }
}

function parseMaxspeed(raw) {
  if (!raw) return null;
  const n = parseInt(raw); if (!isNaN(n)) return n;
  if (raw==='FR:urban') return 50; if (raw==='FR:rural') return 80;
  if (raw==='FR:motorway') return 130; if (raw==='FR:expressway') return 110;
  if (raw.includes('mph')) return Math.round(parseFloat(raw)*1.60934);
  return null;
}

function setOsmStatus(state, msg) {
  document.getElementById('osmDot').className='osm-dot'+(state?' '+state:'');
  document.getElementById('osmStatus').textContent=msg;
}

// ============================================================
// WEATHER
// ============================================================
async function fetchWeather(lat, lon) {
  const now = Date.now();
  if (now - lastWeatherFetch < 300000) return; // toutes les 5 min
  lastWeatherFetch = now;

  if (WEATHER_API_KEY === 'YOUR_KEY') {
    document.getElementById('weatherTemp').textContent = '-- °C';
    document.getElementById('weatherDesc').textContent = 'Clé API manquante';
    return;
  }

  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${WEATHER_API_KEY}&units=metric&lang=fr`);
    const data = await res.json();
    const temp = Math.round(data.main.temp);
    const desc = data.weather[0].description;
    const icon = getWeatherIcon(data.weather[0].id);
    document.getElementById('weatherIcon').textContent = icon;
    document.getElementById('weatherTemp').textContent = temp + ' °C';
    document.getElementById('weatherDesc').textContent = desc;
  } catch {
    document.getElementById('weatherDesc').textContent = 'Indisponible';
  }
}

function getWeatherIcon(id) {
  if (id >= 200 && id < 300) return '⛈️';
  if (id >= 300 && id < 400) return '🌦️';
  if (id >= 500 && id < 600) return '🌧️';
  if (id >= 600 && id < 700) return '❄️';
  if (id >= 700 && id < 800) return '🌫️';
  if (id === 800) return '☀️';
  if (id === 801) return '🌤️';
  if (id <= 804) return '☁️';
  return '🌡️';
}

// ============================================================
// TRAFFIC (estimation basée sur heure + vitesse)
// ============================================================
function estimateTraffic() {
  const now = Date.now();
  if (now - lastTrafficFetch < 60000) return;
  lastTrafficFetch = now;

  const hour = new Date().getHours();
  const day = new Date().getDay(); // 0=dim, 6=sam
  const isWeekend = day === 0 || day === 6;
  const isRushHour = !isWeekend && ((hour >= 7 && hour <= 9) || (hour >= 17 && hour <= 19));
  const isMorning = hour >= 6 && hour <= 11;
  const isNight = hour >= 22 || hour <= 5;

  let icon, status, sub;
  if (isNight) { icon='🌙'; status='Fluide'; sub='Trafic nuit'; }
  else if (isRushHour) { icon='🚨'; status='Chargé'; sub='Heure de pointe'; }
  else if (isWeekend && isMorning) { icon='⚠️'; status='Modéré'; sub='Weekend matin'; }
  else { icon='✅'; status='Fluide'; sub='Trafic normal'; }

  document.getElementById('trafficIcon').textContent = icon;
  document.getElementById('trafficStatus').textContent = status;
  document.getElementById('trafficSub').textContent = sub;
}

// ============================================================
// COMPASS
// ============================================================
function initCompass() {
  if (window.DeviceOrientationEvent) {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(p => {
        if (p === 'granted') window.addEventListener('deviceorientation', onOrientation);
      });
    } else {
      window.addEventListener('deviceorientation', onOrientation);
    }
  }
}

function onOrientation(e) {
  let heading = e.webkitCompassHeading || (e.alpha ? (360 - e.alpha) : null);
  if (heading === null) return;
  heading = Math.round(heading);
  currentHeading = heading;
  document.getElementById('compassNeedle').style.transform =
    `translateX(-50%) translateY(-100%) rotate(${heading}deg)`;
  document.getElementById('compassDeg').textContent = heading + '°';
  document.getElementById('compassDir').textContent = getDirection(heading);
}

function getDirection(deg) {
  const dirs = ['N','NE','E','SE','S','SO','O','NO'];
  return dirs[Math.round(deg/45) % 8];
}

// ============================================================
// GPS
// ============================================================
function toggleTracking() { tracking ? stopTracking() : startTracking(); }

function startTracking() {
  if (!navigator.geolocation) { alert('GPS non disponible.'); return; }
  initAudio(); initCompass(); tracking = true; maxSpeed = 0;
  document.getElementById('startBtn').textContent = '■ ARRÊTER';
  document.getElementById('startBtn').classList.add('stop');
  document.getElementById('statusDot').className = 'status-dot active';
  setOsmStatus('loading','GPS en cours...');
  watchId = navigator.geolocation.watchPosition(onPosition, onError, {
    enableHighAccuracy:true, maximumAge:1000, timeout:10000
  });
}

function stopTracking() {
  tracking = false; navigator.geolocation.clearWatch(watchId); watchId = null;
  stopBeeping(); currentSpeed = 0; osmMode = false; osmLimit = null; maxSpeed = 0;
  document.getElementById('startBtn').textContent = '▶ DÉMARRER';
  document.getElementById('startBtn').classList.remove('stop');
  document.getElementById('statusDot').className = 'status-dot';
  setOsmStatus('','OSM inactif'); updateUI();
}

function onPosition(pos) {
  currentSpeed = Math.max(0, Math.round((pos.coords.speed||0)*3.6));
  if (currentSpeed > maxSpeed) maxSpeed = currentSpeed;
  const pct = Math.max(0, Math.min(100, (100-(pos.coords.accuracy||999))/95*100));
  document.getElementById('accuracyFill').style.width = pct+'%';
  const lat = pos.coords.latitude, lon = pos.coords.longitude;

  // Heading from GPS if no compass
  if (pos.coords.heading && currentHeading === null) {
    const h = Math.round(pos.coords.heading);
    document.getElementById('compassNeedle').style.transform =
      `translateX(-50%) translateY(-100%) rotate(${h}deg)`;
    document.getElementById('compassDeg').textContent = h+'°';
    document.getElementById('compassDir').textContent = getDirection(h);
  }

  if (currentSpeed > 5) {
    fetchOsmLimit(lat, lon);
    fetchWeather(lat, lon);
    estimateTraffic();
  }
  updateUI();
}

function onError() { setOsmStatus('','Erreur GPS'); }

// ============================================================
// UI
// ============================================================
function updateUI() {
  const limit = activeLimit();
  const over = currentSpeed > limit;
  const excess = Math.max(0, currentSpeed - limit);

  const sv = document.getElementById('speedValue');
  sv.textContent = currentSpeed;
  sv.className = 'speed-value'+(over?' over':'');
  document.getElementById('speedCard').className = 'speed-card'+(over?' over':'');

  if (tracking) {
    document.getElementById('statusDot').className = 'status-dot '+(over?'danger':'active');
  }

  document.getElementById('limitBadge').textContent = limit;
  document.getElementById('maxSpeed').textContent = maxSpeed;

  const ex = document.getElementById('excessValue');
  ex.textContent = excess;
  ex.style.color = excess>20?'var(--danger)':excess>0?'var(--warn)':'var(--muted)';

  const banner = document.getElementById('alertBanner');
  if (over && tracking) { banner.classList.add('visible'); startBeeping(); }
  else { banner.classList.remove('visible'); stopBeeping(); }
}

updateUI();
</script>
